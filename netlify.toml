# Netlify configuration for Lico Resources
# Netlify auto-detects Next.js, but pinning these settings keeps the build deterministic.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Pin Node to v20 (Next.js 15 requirement) regardless of Netlify defaults
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# The official plugin enables full SSR / API routes / next/image
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache control for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/articles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers (also set in next.config.mjs, but belt-and-braces)
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
